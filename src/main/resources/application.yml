spring:
  application:
    name: campus-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/campus_platform}
    username: ${DB_USERNAME:campus_user}
    password: ${DB_PASSWORD:campus_pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 20
        format_sql: true

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ── Mail ──────────────────────────────────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:yourcollege@gmail.com}
    password: ${MAIL_PASSWORD:your_16_char_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
            redirect-uri: "https://cruelly-email-appeasing.ngrok-free.dev/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

app:
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    expiration-ms: 86400000

  platform-owner-email: ${PLATFORM_OWNER_EMAIL:rishi.u1969@gmail.com}
  platform-owner-name: ${PLATFORM_OWNER_NAME:Rishi}

  oauth2:
    redirect-uri: "https://molehill-humid-unstirred.ngrok-free.dev/auth/callback"


  cors:
    allowed-origins:
      - "https://outspoken-uphill-zone.ngrok-free.dev"
      - "https://molehill-humid-unstirred.ngrok-free.dev"

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth2-redirect-url: http://localhost:8081/swagger-ui/oauth2-redirect.html

logging:
  level:
    com.campus.platform: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: DEBUG

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}